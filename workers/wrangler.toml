# KiamiCloud API — Cloudflare Workers
name = "kiamicloud-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Firebase Project ID (nao e segredo — aud/iss do JWT)
[vars]
FIREBASE_PROJECT_ID = "kiamicloud"
ENVIRONMENT = "development"
R2_BUCKET_NAME = "kiamicloud-files-prod"
R2_PRESIGN_EXPIRES_SECONDS = "900"
PAYMENTS_ENABLED = "true"
# Credenciais locais: copiar workers/.dev.vars.example → .dev.vars
# ADMIN_UIDS, BLADE_CONSOLE_*, PAYMENT_WEBHOOK_SECRET, MEDIA_TOKEN_SECRET, SECURITY_IP_PEPPER
# API_ALLOWED_ORIGINS = "https://app.kiamicloud.com"

[dev]
port = 8787
# 0.0.0.0 — telemovel na Wi-Fi acede via http://192.168.100.170:8787 (ZimaBlade)
ip = "0.0.0.0"

# D1 — metadados (migracoes em ../database/migrations)
[[d1_databases]]
binding = "DB"
database_name = "kiamicloud-db"
database_id = "1bdb62ef-9390-41bb-93f2-5c4d095bea92"
migrations_dir = "../database/migrations"

# R2 — ficheiros privados (Fase 6)
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "kiamicloud-files-prod"

# Purge automático da lixeira (ficheiros com >30 dias em soft delete)
[triggers]
crons = ["0 4 * * *"]

# --- Ambiente beta (deploy: wrangler deploy --env beta) ---
# RETENCAO: dados beta podem ser apagados apos 2026-07-20 — ver scripts/purge-beta-retention.ps1
# IMPORTANTE: beta deve usar D1 separado de producao.
#   npx wrangler d1 create kiamicloud-db-beta
#   npx wrangler d1 migrations apply kiamicloud-db-beta --remote --env beta
#   Actualizar database_id abaixo e definir secrets:
#   wrangler secret put ADMIN_UIDS --env beta
#   wrangler secret put MEDIA_TOKEN_SECRET --env beta
#   wrangler secret put PAYMENT_WEBHOOK_SECRET --env beta
[env.beta]
name = "kiamicloud-api-beta"
workers_dev = true

[env.beta.vars]
ENVIRONMENT = "beta"
FIREBASE_PROJECT_ID = "kiamicloud"
PAYMENTS_ENABLED = "true"
API_VERSION = "0.6.0-beta"
R2_BUCKET_NAME = "kiamicloud-files-beta"
R2_PRESIGN_EXPIRES_SECONDS = "900"
API_ALLOWED_ORIGINS = "https://kiamicloud.web.app,https://kiamicloud.firebaseapp.com"

[[env.beta.d1_databases]]
binding = "DB"
database_name = "kiamicloud-db-beta"
# Substituir apos: npx wrangler d1 create kiamicloud-db-beta
database_id = "8f24fc4a-becc-46c8-b852-441bc182e140"
migrations_dir = "../database/migrations"

[[env.beta.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "kiamicloud-files-beta"

[env.beta.triggers]
crons = ["0 3 * * *", "0 4 * * *"]

# --- Producao (deploy: wrangler deploy --env production) ---
# Secrets obrigatorios (nao commitar):
#   wrangler secret put ADMIN_UIDS --env production
#   wrangler secret put MEDIA_TOKEN_SECRET --env production
#   wrangler secret put PAYMENT_WEBHOOK_SECRET --env production
#   wrangler secret put SECURITY_IP_PEPPER --env production
[env.production]
name = "kiamicloud-api"

[env.production.vars]
ENVIRONMENT = "production"
FIREBASE_PROJECT_ID = "kiamicloud"
PAYMENTS_ENABLED = "true"
API_VERSION = "0.6.0"
R2_BUCKET_NAME = "kiamicloud-files-prod"
R2_PRESIGN_EXPIRES_SECONDS = "900"
API_ALLOWED_ORIGINS = "https://kiamicloud.web.app,https://kiamicloud.firebaseapp.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "kiamicloud-db"
database_id = "1bdb62ef-9390-41bb-93f2-5c4d095bea92"
migrations_dir = "../database/migrations"

[[env.production.r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "kiamicloud-files-prod"

[env.production.triggers]
crons = ["0 3 * * *", "0 4 * * *"]
