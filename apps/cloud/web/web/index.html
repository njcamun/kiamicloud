  <!-- Instalação PWA (Android/Chrome) — evento beforeinstallprompt -->

  <script>

    window.kiamiDeferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function (e) {

      e.preventDefault();

      window.kiamiDeferredInstallPrompt = e;

      window.dispatchEvent(new Event('kiami-pwa-install-available'));

    });

    window.addEventListener('appinstalled', function () {

      window.kiamiDeferredInstallPrompt = null;

      window.dispatchEvent(new Event('kiami-pwa-installed'));

    });

    window.kiamiInstallPwa = function () {

      var e = window.kiamiDeferredInstallPrompt;

      if (!e) return Promise.resolve('unavailable');

      return e.prompt().then(function () {

        return e.userChoice;

      }).then(function (choice) {

        window.kiamiDeferredInstallPrompt = null;

        return choice.outcome;

      });

    };

  </script>
