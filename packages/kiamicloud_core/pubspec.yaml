name: kiamicloud_core
description: Núcleo partilhado KiamiCloud — design system, rotas, widgets e ecrãs base.
version: 0.6.0
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.3.0
  google_sign_in_dartio: ^0.3.0
  http: ^1.2.2
  file_picker: ^8.1.7
  path: ^1.9.0
  shared_preferences: ^2.3.5
  connectivity_plus: ^6.1.4
  desktop_drop: ^0.4.4
  image: ^4.5.4
  url_launcher: ^6.3.1
  pdfx: ^2.9.2
  flutter_native_splash: ^2.4.6
  video_player: ^2.9.2
  archive: ^4.0.0
  xml: ^6.5.0
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.4.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/branding/splashpage.png
    - assets/branding/legal_documentation.pdf
    - assets/categories/
