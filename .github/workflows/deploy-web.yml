name: Deploy KiamiCloud Web to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies (core + web)
        run: |
          cd packages/kiamicloud_core
          flutter pub get
          cd ../../apps/cloud/web
          flutter pub get

      - name: Sync branding assets
        run: dart run tool/sync_branding.dart

      - name: Generate PWA icons
        run: |
          cd apps/cloud/web
          dart run flutter_launcher_icons

      - name: Build web release
        run: |
          cd apps/cloud/web
          flutter build web --release --base-href / --no-wasm-dry-run --dart-define=KIAMI_ENV=production --dart-define=KIAMI_API_BASE_URL=https://kiamicloud-api.kiamicloud.workers.dev

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KIAMICLOUD }}
          projectId: kiamicloud
          channelId: live
          entryPoint: .
